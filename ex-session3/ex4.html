<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Bài 4: Pseudo class</title>
    <link rel="stylesheet" href="ex4.css">
</head>

<body>
    <section class="course-list">
        <h2>Danh sách khóa học</h2>
        <ul>
            <li>HTML & CSS cơ bản</li>
            <li>JavaScript cơ bản</li>
